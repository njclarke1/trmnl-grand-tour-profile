version: "3"
services:
  grand-tour:
    build: .
    container_name: grand-tour
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    ports:
      - "5051:5000"
    environment:
      - TZ=Europe/London
      - DATA_DIR=/data
      - IMAGES_DIR=/images
      - BASE_URL=http://192.168.68.111:5051
    volumes:
      - ./data:/data:ro
      - ./images:/images:ro
